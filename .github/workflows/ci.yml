name: CI

on:
  push:
  pull_request:

jobs:
  cmake:
    name: CMake ${{ matrix.os }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        build_type:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: cmake-build
          key: cmake-${{ matrix.os }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake', 'src/*.c', 'src/*.h', 'tests/sim/*.c', 'tests/sim/*.h') }}
          restore-keys: |
            cmake-${{ matrix.os }}-${{ matrix.build_type }}-
            cmake-${{ matrix.os }}-

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B cmake-build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTS=ON
          -DBUILD_EXAMPLES=ON
          -DBUILD_PERF=ON
          -DENABLE_STRICT_WARNINGS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -S . -B cmake-build
          -G Ninja
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTS=ON
          -DBUILD_EXAMPLES=ON
          -DBUILD_PERF=ON
          -DENABLE_STRICT_WARNINGS=ON

      - name: Build
        run: cmake --build cmake-build --parallel

      - name: Test
        run: ctest --test-dir cmake-build --output-on-failure

  sanitizer:
    name: Sanitizer ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B cmake-build-asan
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTS=ON
          -DBUILD_EXAMPLES=ON
          -DBUILD_PERF=ON
          -DENABLE_STRICT_WARNINGS=ON
          -DENABLE_SANITIZER=ON

      - name: Build
        run: cmake --build cmake-build-asan --parallel

      - name: Test
        run: ctest --test-dir cmake-build-asan --output-on-failure

  windows-batch:
    name: Windows batch runner
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Clang
        run: clang --version

      - name: Run legacy test script
        run: build\run_all_tests.bat test

      - name: Run performance benchmark
        run: build\build_perf.bat run
