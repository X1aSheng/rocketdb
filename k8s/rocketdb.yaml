apiVersion: v1
kind: Namespace
metadata:
  name: rocketdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketdb-server
  namespace: rocketdb
  labels:
    app: rocketdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketdb
  template:
    metadata:
      labels:
        app: rocketdb
    spec:
      containers:
        - name: rocketdb
          image: rocketdb:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "echo STATS | nc -q 1 127.0.0.1 8080 | head -1"
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rocketdb
  namespace: rocketdb
spec:
  type: LoadBalancer
  selector:
    app: rocketdb
  ports:
    - name: rdb
      port: 8080
      targetPort: 8080
      protocol: TCP
